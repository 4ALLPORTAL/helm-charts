{{/*
Sealed Secrets controller — DHI chart from dhi.io/sealed-secrets-chart.
*/}}
{{- if .Values.sealedSecrets.enabled }}
apiVersion: v1
kind: Namespace
metadata:
  name: sealed-secrets
  labels: {{- include "base-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: sealed-secrets
    pod-security.kubernetes.io/enforce: restricted
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sealed-secrets
  namespace: sealed-secrets
  labels: {{- include "base-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: sealed-secrets
spec:
  interval: 1m
  chart:
    spec:
      chart: sealed-secrets-chart
      version: {{ include "base-cluster.versions.sealedSecrets.chart" . | quote }}
      sourceRef:
        kind: HelmRepository
        name: dhi
        namespace: {{ .Release.Namespace }}
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  values:
    {{- with .Values.global.imagePullSecretName }}
    image:
      pullSecrets:
        - {{ . }}
    {{- end }}
    podSecurityContext:
      enabled: true
      fsGroup: 65534
    containerSecurityContext:
      enabled: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 65534
      runAsGroup: 65534
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop: [ALL]
    resources: {{- .Values.sealedSecrets.resources | toYaml | nindent 6 }}
    {{- with .Values.sealedSecrets.values }}
    {{- . | toYaml | nindent 4 }}
    {{- end }}
{{- end }}
