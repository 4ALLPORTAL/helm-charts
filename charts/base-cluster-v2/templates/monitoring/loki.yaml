{{- if and .Values.monitoring.enabled .Values.monitoring.loki.enabled }}
{{/*
Loki — DHI `loki-chart`, SingleBinary mode, filesystem chunk store on PVC.

Production deployments should swap the filesystem backend for S3-compatible
object storage by overriding loki.storage.* via a values patch.
*/}}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
  labels: {{- include "base-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
spec:
  interval: 5m
  chart:
    spec:
      chart: loki-chart
      version: {{ include "base-cluster.versions.loki.chart" . | quote }}
      sourceRef:
        kind: HelmRepository
        name: dhi
        namespace: {{ .Release.Namespace }}
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  values:
    {{- with .Values.global.imagePullSecretName }}
    global:
      imagePullSecrets:
        - name: {{ . }}
    {{- end }}
    deploymentMode: Monolithic
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      storage:
        type: filesystem
      limits_config:
        retention_period: {{ .Values.monitoring.loki.retention | quote }}
      compactor:
        retention_enabled: true
        delete_request_store: filesystem
    singleBinary:
      replicas: 1
      resources: {{- toYaml .Values.monitoring.loki.resources | nindent 8 }}
      podLabels:
        app.kubernetes.io/instance: loki
      persistence:
        enabled: true
        size: {{ .Values.monitoring.loki.size }}
        {{- with .Values.monitoring.storageClass }}
        storageClass: {{ . | quote }}
        {{- end }}
    ## Disable the scalable/distributed paths and bundled extras.
    backend:        { replicas: 0 }
    read:           { replicas: 0 }
    write:          { replicas: 0 }
    chunksCache:    { enabled: false }
    resultsCache:   { enabled: false }
    minio:          { enabled: false }
    gateway:        { enabled: false }
    test:           { enabled: false }
    monitoring:
      selfMonitoring:
        enabled: false
      lokiCanary:
        enabled: false
{{- end }}
