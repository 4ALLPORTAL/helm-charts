{{- if .Values.fourAllPortal.database.operator.enabled -}}
  {{- $externalSecret := .Values.fourAllPortal.database.operator.secretName -}}
  {{- $hasUser := not (empty .Values.fourAllPortal.database.operator.user) -}}
  {{- $hasPassword := not (empty .Values.fourAllPortal.database.operator.password) -}}
  {{- $hasDatabase := not (empty .Values.fourAllPortal.database.operator.databaseName) -}}
  {{- $hasInlineCredentials := or $hasUser $hasPassword $hasDatabase -}}
  {{- if and $hasInlineCredentials (empty $externalSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-databaseuser-secret
  namespace: {{ .Release.Namespace }}
  labels:
    database-operator.fourallportal.com/input-secret: "true"
stringData:
    {{- if $hasUser }}
  user: {{ .Values.fourAllPortal.database.operator.user }}
    {{- end }}
    {{- if $hasPassword }}
  password: {{ .Values.fourAllPortal.database.operator.password }}
    {{- end }}
    {{- if $hasDatabase }}
  database: {{ .Values.fourAllPortal.database.operator.databaseName }}
    {{- end }}
  {{- end }}
---
apiVersion: com.fourallportal.credentialsoperator/v1beta1
kind: DatabaseUser
metadata:
  name: {{ .Release.Name }}-databaseuser
  namespace: {{ .Release.Namespace }}
spec:
  database: {{ .Values.fourAllPortal.database.operator.databaseRef | quote }}
    {{- if $hasDatabase }}
  databaseName: {{ .Values.fourAllPortal.database.operator.databaseName | quote }}
    {{- end }}
    {{- if $externalSecret }}
  secretName: {{ $externalSecret }}
    {{- else if $hasInlineCredentials }}
  secretName: {{ .Release.Name }}-databaseuser-secret
    {{- end }}
{{- end }}
